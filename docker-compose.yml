services:
  db:
    image: postgres:16-alpine
    container_name: nossa-grana-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: nossagrana
      POSTGRES_PASSWORD: nossagrana
      POSTGRES_DB: nossagrana
    # Host na 5433 p/ não conflitar com um PostgreSQL local na 5432.
    ports:
      - "5433:5432"
    volumes:
      - nossa_grana_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nossagrana"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: nossa-grana-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3333
      DATABASE_URL: "postgresql://nossagrana:nossagrana@db:5432/nossagrana?schema=public"
      CORS_ORIGIN: "http://localhost:8081"
      # Segredos de DEV — troque em produção (openssl rand -hex 48).
      JWT_ACCESS_SECRET: "dev-access-secret-change-me-please-0123456789abcdef"
      JWT_REFRESH_SECRET: "dev-refresh-secret-change-me-please-0123456789abcdef"
      ACCESS_TOKEN_TTL: "15m"
      REFRESH_TOKEN_TTL_DAYS: "30"
      INVITATION_TTL_DAYS: "7"
    ports:
      - "3333:3333"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: nossa-grana-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8081:80"

volumes:
  nossa_grana_pgdata:
