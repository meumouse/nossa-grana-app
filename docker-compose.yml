services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nossa-grana-web
    restart: unless-stopped
    ports:
      - "8081:80"
    networks:
      # Mesma rede do repo da API (nossa-grana-api). O nginx faz proxy
      # /api → api:3333, então o browser fala sempre na mesma origem (sem CORS).
      - nossa-grana-net

# Rede compartilhada entre os dois repos (API + App). Crie uma vez com:
#   docker network create nossa-grana-net
# E suba a API primeiro (no repo nossa-grana-api): docker compose up -d
networks:
  nossa-grana-net:
    external: true
    name: nossa-grana-net
