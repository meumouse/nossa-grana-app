server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # DNS interno do Docker/EasyPanel. Resolver em runtime (via variável no
  # proxy_pass) evita que o nginx aborte no boot se a API ainda não subiu —
  # em vez de crash-loop, devolve 502 na rota e o app continua servindo.
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Host:porta da API. Injetado por envsubst a partir de $API_UPSTREAM
  # (ver Dockerfile/compose). EasyPanel: n8n_nossa-grana-api:3333;
  # docker-compose local: api:3333.
  set $api_upstream ${API_UPSTREAM};

  # Proxy da API (mesma origem → sem CORS no browser).
  location /api/ {
    proxy_pass http://$api_upstream$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /health {
    proxy_pass http://$api_upstream/health;
  }

  # Não cachear o service worker / index (evita app preso em versão antiga).
  location = /sw.js {
    add_header Cache-Control "no-cache";
    try_files $uri =404;
  }

  # SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
